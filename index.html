<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CMA Dashboard</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0d1b2e;color:white}
.layout{display:flex;height:100vh}
.sidebar{width:180px;background:#112240;padding:10px;overflow:auto}
.item{padding:6px;cursor:pointer}
.item:hover{background:#1e3a5f}
.main{flex:1;padding:20px;overflow:auto}
.card{background:#112240;padding:15px;border-radius:8px;margin-bottom:10px}
button{cursor:pointer}
</style>
</head>

<body>
<div id="root"></div>

<script>
const {useState,useMemo,useEffect,useRef}=React;

/* ========= HELPERS ========= */

const FMT=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n);
const FMT2=n=>n>=1e9?"$"+(n/1e9).toFixed(2)+"B":n>=1e6?"$"+(n/1e6).toFixed(1)+"M":FMT(n);

const parseArgNum=s=>{
 if(!s||!s.trim()||s=="-")return null;
 const v=parseFloat(s.replace(/\./g,"").replace(",","."));
 return isNaN(v)?null:v;
};

/* ========= PARSER ROBUSTO ========= */

function parseCSV(text){
 const lines=text.split(/\r?\n/);
 const sep=lines[0].includes("\t")?"\t":";";

 let tipo="Cash",moneda="USD",ticker="USD",nombre="Dólar";
 const rows=[];

 for(let i=1;i<lines.length;i++){
   const line=lines[i];
   if(!line.trim())continue;

   const cols=line.split(sep);
   const c0=(cols[0]||"").trim();
   if(!c0||c0.toLowerCase().startsWith("total"))continue;

   const ars=parseArgNum(cols[11]);

   if(ars===null){
     if(c0.includes("CEDEAR"))tipo="CEDEAR";
     else if(c0.includes("Acciones"))tipo="Acciones";
     else if(c0.includes("Obligaciones"))tipo="ON";
     else if(c0.includes("Fondos"))tipo="FCI";
     else if(c0.includes("Títulos"))tipo="Bonos";
     else if(c0.includes("LETRAS"))tipo="Letra";
     else if(c0.includes("Fideicomiso"))tipo="FF";
     else if(c0.includes("Futuros"))tipo="Futuro";
     else if(c0.includes("Dólar")||c0.includes("Pesos"))tipo="Cash";

     if(c0.includes("Pesos"))moneda="ARS";
     else if(c0.includes("Cable"))moneda="USD Cable";
     else if(c0.includes("Dólar"))moneda="USD";

     const m=c0.match(/^(.+?)\s*-\s*.+?\/\s*(.+)$/);
     if(m){ticker=m[1].trim();nombre=m[2].trim();}
     continue;
   }

   if(/^\d{3,7}$/.test(c0)&&ars>0){
     rows.push({comitente:c0,tipo,moneda,ticker,nombre,ars});
   }
 }
 return rows;
}

/* ========= CHART ========= */

function Donut({data}){
 const ref=useRef();
 useEffect(()=>{
   if(!data.length)return;
   const c=new Chart(ref.current,{
     type:"doughnut",
     data:{
       labels:data.map(d=>d.label),
       datasets:[{data:data.map(d=>d.value)}]
     }
   });
   return()=>c.destroy();
 },[data]);
 return React.createElement("canvas",{ref});
}

/* ========= APP ========= */

function App(){
 const [data,setData]=useState([]);
 const [sel,setSel]=useState(null);

 const total=useMemo(()=>data.reduce((s,r)=>s+r.ars,0),[data]);

 const byTipo=useMemo(()=>{
   const m={};
   data.forEach(r=>m[r.tipo]=(m[r.tipo]||0)+r.ars);
   return Object.entries(m).map(([k,v])=>({label:k,value:v}));
 },[data]);

 const coms=useMemo(()=>[...new Set(data.map(r=>r.comitente))],[data]);

 const handleFile=async file=>{
   const text=await file.text();
   setData(parseCSV(text));
 };

 if(!data.length){
   return React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh"}},
     React.createElement("h2",null,"CMA Dashboard"),
     React.createElement("button",{onClick:()=>document.getElementById("file").click()},"Subir CSV"),
     React.createElement("input",{id:"file",type:"file",style:{display:"none"},onChange:e=>handleFile(e.target.files[0])})
   );
 }

 return React.createElement("div",{className:"layout"},

   /* SIDEBAR */
   React.createElement("div",{className:"sidebar"},
     React.createElement("div",{className:"item",onClick:()=>setSel(null)},"Global"),
     ...coms.map(c=>
       React.createElement("div",{key:c,className:"item",onClick:()=>setSel(c)},c)
     )
   ),

   /* MAIN */
   React.createElement("div",{className:"main"},

     React.createElement("div",{className:"card"},
       React.createElement("h2",null,"Total: "+FMT2(total))
     ),

     !sel &&
     React.createElement("div",{style:{width:300}},
       React.createElement(Donut,{data:byTipo})
     ),

     sel &&
     React.createElement("div",{className:"card"},
       React.createElement("h3",null,"Cliente "+sel),
       ...data.filter(r=>r.comitente===sel).map((r,i)=>
         React.createElement("div",{key:i},
           r.ticker+" - "+FMT(r.ars)
         )
       )
     )
   )
 );
}

ReactDOM.createRoot(document.getElementById("root")).render(
 React.createElement(App)
);
</script>
</body>
</html>
