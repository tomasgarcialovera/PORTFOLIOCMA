function parseCSV(text){
  const lines=text.split(/\r?\n/);
  const sep=lines[0]?.includes("\t")?"\t":";";

  let tipo="Cash";
  let moneda="USD";
  let ticker="USD";
  let nombre="Dólar";

  const rows=[];

  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(sep);
    const c0=(cols[0]||"").trim();
    if(!c0) continue;

    const ars=parseArgNum(cols[11]);

    // Detectar secciones
    if(ars===null){
      if(c0.includes("Pesos")) moneda="ARS";
      if(c0.includes("Dólar")) moneda="USD";
      if(c0.includes("CEDEAR")) tipo="CEDEAR";
      if(c0.includes("Acciones")) tipo="Acciones";
      if(c0.includes("Fondos")) tipo="FCI";

      const m=c0.match(/^(.+?)\s*-\s*.+?\/\s*(.+)$/);
      if(m){
        ticker=m[1].trim();
        nombre=m[2].trim();
      }
      continue;
    }

    if(/^\d{3,7}$/.test(c0) && ars>0){
      rows.push({
        comitente:c0,
        tipo,
        moneda,
        ticker,
        nombre,
        ars
      });
    }
  }

  return rows;
}
