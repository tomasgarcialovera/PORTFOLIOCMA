<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CMA — Dashboard Carteras</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2e;--bg2:#112240;--bg3:#1a2f4a;--bg4:#1e3a5f;
  --text:#e8f0fe;--text2:#8ba3c7;--text3:#506a8e;
  --accent:#2e80e8;--accent2:#1a5cbf;
  --green:#00c896;--red:#f05c5c;--amber:#f5a623;--purple:#9b6dff;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --r:8px;--rl:12px;
}
html,body,#root{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow:hidden}
#root{display:flex;flex-direction:column}

/* HEADER */
.hdr{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border2);flex-shrink:0;z-index:10}
.hdr-logo{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.5px;white-space:nowrap}
.hdr-sep{width:1px;height:24px;background:var(--border2)}
.hdr-total{font-size:11px;color:var(--text2)}
.hdr-total span{color:var(--text);font-weight:600;font-size:13px;margin-left:4px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hdr-date{font-size:11px;color:var(--text3)}
.btn-load{background:var(--accent2);color:var(--text);border:none;border-radius:var(--r);padding:5px 12px;font-size:11px;cursor:pointer;white-space:nowrap}
.btn-load:hover{background:var(--accent)}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;background:var(--bg3);color:var(--text);border:.5px solid var(--border2);border-radius:var(--r);padding:5px 8px;font-size:11px;outline:none}
.sb-list{flex:1;overflow-y:auto;padding:4px 0}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-track{background:transparent}
.sb-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.sb-item{padding:7px 14px;font-size:12px;cursor:pointer;border-left:3px solid transparent;color:var(--text2);display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--bg4);color:var(--text);border-left-color:var(--accent);font-weight:500}
.sb-item.global{color:var(--accent);font-weight:600}
.sb-badge{font-size:9px;color:var(--text3);background:var(--bg4);padding:1px 5px;border-radius:4px}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* CARDS */
.card-row{display:flex;gap:12px;flex-wrap:wrap}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;flex:1;min-width:0}
.card.accent{border-color:var(--accent);background:linear-gradient(135deg,var(--bg3),var(--bg4))}
.card-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card-val{font-size:20px;font-weight:700;color:var(--text);line-height:1.1}
.card-val.green{color:var(--green)}
.card-val.red{color:var(--red)}
.card-val.accent{color:var(--accent)}
.card-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* SECTION */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.section-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:12px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.4px}
.section-body{padding:16px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px;font-size:11px;cursor:pointer;color:var(--text3);white-space:nowrap;font-weight:500;letter-spacing:.3px}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%}
th{padding:8px 10px;text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer}
th:hover{color:var(--text2)}
td{padding:7px 10px;font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:hover{background:var(--bg3)}
.td-num{text-align:right;font-variant-numeric:tabular-nums;font-family:monospace;font-size:11px}
.td-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500}
.td-badge.cash{background:rgba(55,138,221,.15);color:#378ADD}
.td-badge.acc{background:rgba(29,158,117,.15);color:#1D9E75}
.td-badge.ced{background:rgba(127,119,221,.15);color:#7F77DD}
.td-badge.bon{background:rgba(212,83,126,.15);color:#D4537E}
.td-badge.fci{background:rgba(186,117,23,.15);color:#BA7517}
.td-badge.on{background:rgba(99,153,34,.15);color:#639922}
.td-badge.other{background:rgba(136,135,128,.15);color:#888780}

/* GRID */
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}

/* ALERT */
.al{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:var(--r);margin-bottom:6px;font-size:11px;line-height:1.5}
.al.danger{background:rgba(240,92,92,.12);color:#f09595;border:.5px solid rgba(240,92,92,.3)}
.al.warn{background:rgba(245,166,35,.10);color:#f5c842;border:.5px solid rgba(245,166,35,.25)}

/* CHART */
.chart-wrap{position:relative}

/* BAR INLINE */
.bar-bg{height:4px;border-radius:2px;background:var(--bg4);overflow:hidden;width:100%;margin-top:3px}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}

/* UPLOAD */
.upload-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:40px}
.upload-box{border:2px dashed var(--border2);border-radius:var(--rl);padding:4rem 3rem;text-align:center;cursor:pointer;max-width:480px;width:100%;background:var(--bg2);transition:border-color .2s,background .2s}
.upload-box:hover,.upload-box.drag{border-color:var(--accent);background:var(--bg3)}
.upload-icon{font-size:48px;margin-bottom:14px}
.upload-title{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text)}
.upload-sub{font-size:12px;color:var(--text2)}
.pbg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:16px;width:100%}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.plog{font-size:10px;color:var(--text3);margin-top:8px;font-family:monospace}

/* MISC */
.empty{padding:24px;text-align:center;color:var(--text3);font-size:12px}
.dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.leg{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:8px}
.legitem{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
select,input{background:var(--bg3);color:var(--text);border:.5px solid var(--border2);border-radius:var(--r);padding:5px 9px;font-size:11px;outline:none}
select:focus,input:focus{border-color:var(--accent)}
button{cursor:pointer}
.tag{display:inline-flex;align-items:center;gap:4px;background:rgba(46,128,232,.15);color:var(--accent);border-radius:4px;padding:2px 7px;font-size:10px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useMemo,useRef,useCallback,useEffect,Fragment}=React;

const FMT=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n);
const FMUSD=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"USD",maximumFractionDigits:2}).format(n);
const PCT=n=>(n*100).toFixed(1)+"%";
const FMT2=n=>n>=1e9?"$"+(n/1e9).toFixed(2)+"B":n>=1e6?"$"+(n/1e6).toFixed(1)+"M":n>=1e3?"$"+(n/1e3).toFixed(0)+"K":FMT(n);
const SUM=rows=>rows.reduce((s,r)=>s+r.ars,0);

const TC={
  "Cash":"#378ADD","Acciones ARG":"#1D9E75","CEDEAR":"#7F77DD",
  "Acc. Exterior":"#D85A30","Bono Soberano":"#D4537E","ON":"#639922",
  "Tít. Provincial":"#185FA5","FCI":"#BA7517","Letra":"#993556",
  "Tít. Público":"#0F6E56","FF":"#3C3489","Futuro":"#888780",
};
const TIPO_BADGE={
  "Cash":"cash","Acciones ARG":"acc","CEDEAR":"ced",
  "Bono Soberano":"bon","Tít. Provincial":"bon","Tít. Público":"bon",
  "FCI":"fci","ON":"on","Acc. Exterior":"acc","Letra":"on",
};

// ── PDF Parser ────────────────────────────────────────────────────────────────
const SMAP={
  "U$S - Dólar":"Cash|USD","U$S-C - Dólar Cable":"Cash|USD Cable","$ - Pesos":"Cash|ARS",
  "Acciones / Dólar Cable":"Acc. Exterior|USD Cable","Acciones / Dólar":"Acc. Exterior|USD",
  "Acciones / Pesos":"Acciones ARG|ARS","Acciones Exterior / Dólar":"Acc. Exterior|USD",
  "Acciones Exterior / Dólar Cable":"Acc. Exterior|USD Cable","CEDEAR / Pesos":"CEDEAR|ARS",
  "Fondos / Dólar":"FCI|USD","Fondos / Dólar Cable":"FCI|USD Cable","Fondos / Pesos":"FCI|ARS",
  "Títulos Públicos / Dólar":"Tít. Público|USD","Títulos Públicos / Dólar Cable":"Tít. Público|USD Cable",
  "Títulos Públicos / Pesos":"Tít. Público|ARS","Títulos Provinciales / Dólar":"Tít. Provincial|USD",
  "Títulos Provinciales / Dólar Cable":"Tít. Provincial|USD Cable",
  "Obligaciones Negociables / Dólar":"ON|USD","Obligaciones Negociables / Dólar Cable":"ON|USD Cable",
  "Fideicomiso Financiero / Dólar":"FF|USD","Fideicomiso Financiero / Pesos":"FF|ARS",
  "Futuros Rofex":"Futuro|ARS","Indices":"Futuro|ARS",
  "LETRAS / Dólar Cable":"Letra|USD Cable","LETRAS / Pesos":"Letra|ARS",
};

const parseNum=s=>{const v=parseFloat(String(s||"").replace(/\s/g,"").replace(/\./g,"").replace(",","."));return isNaN(v)?0:v;};
const parseTicker=s=>{const m=s.match(/^([A-Z0-9][A-Z0-9 \-\.]{0,19}?)\s*-\s*\d+\s*\/\s*(.+)$/);return m?{ticker:m[1].trim(),nombre:m[2].trim()}:null;};
const parseComLine=s=>{
  const str=s.trim();
  // El comitente siempre es el primer token: 3-7 dígitos
  const firstSpace=str.search(/\s/);
  if(firstSpace<0)return null;
  const c=str.slice(0,firstSpace).trim();
  if(!/^\d{3,7}$/.test(c))return null;

  // Estrategia: buscar el importe ARS que está justo antes del % final
  // El % está al final: termina con "%" y tiene formato "0,0146%" o "3,26%"
  // El importe ARS es el número inmediatamente anterior al %
  // En el PDF puede venir como "$49.819.920,00" o simplemente "49.819.920,00"

  // 1. Quitar el token de porcentaje final
  const tokens=str.split(/\s+/);
  let pctIdx=-1;
  for(let i=tokens.length-1;i>=0;i--){
    if(tokens[i].includes("%")){pctIdx=i;break;}
  }
  const withoutPct=pctIdx>=0?tokens.slice(0,pctIdx):tokens;

  // 2. El importe ARS es el último token numérico (puede tener $ adelante)
  // Recorremos de atrás hacia adelante buscando el primer número grande
  for(let i=withoutPct.length-1;i>=1;i--){
    const raw=withoutPct[i].replace(/^\$/,"").replace(/\s/g,"");
    const v=parseNum(raw);
    if(!isNaN(v)&&Math.abs(v)>0){
      // Verificar que no sea una fecha (dd-mm-yyyy)
      if(/^\d{2}[-\/]\d{2}[-\/]\d{4}$/.test(withoutPct[i].trim()))continue;
      // Verificar que no sea solo la cotización local (que aparece antes del importe)
      // El importe siempre tiene al menos 3 dígitos antes de la coma
      // Si el token anterior también es numérico y muy similar, tomamos este
      return{comitente:c,ars:Math.abs(v)};
    }
  }
  return null;
};

async function parsePDF(file,onProg,onLog){
  pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const N=pdf.numPages;onLog(`Cargado · ${N} páginas`);
  const rows=[];let tipo="Cash",moneda="USD",ticker="USD",nombre="Dólar disponible",isCash=true;
  for(let p=1;p<=N;p++){
    onProg(Math.round(p/N*100));
    const page=await pdf.getPage(p);const ct=await page.getTextContent();
    const byY={};ct.items.forEach(it=>{const y=Math.round(it.transform[5]);(byY[y]=byY[y]||[]).push(it.str);});
    const lines=Object.keys(byY).sort((a,b)=>b-a).map(y=>byY[y].join(" ").trim()).filter(l=>l);
    for(const line of lines){
      if(/^Hoja\s+N/i.test(line))continue;
      if(["Conforme las","Reporte de Valuación","Visualización consolidada","Total :","Disponible","Denominación"].some(x=>line.startsWith(x)))continue;
      if(line.startsWith("Comitente")&&line.includes("Tenencia"))continue;
      const sk=Object.keys(SMAP).find(k=>line.trim()===k||line.trim().startsWith(k+" "));
      if(sk){[tipo,moneda]=SMAP[sk].split("|");isCash=tipo==="Cash";if(isCash){ticker=moneda==="ARS"?"ARS":moneda==="USD Cable"?"USD Cable":"USD";nombre=moneda==="ARS"?"Pesos":moneda==="USD Cable"?"Dólar Cable":"Dólar";}continue;}
      if(!isCash){const tk=parseTicker(line);if(tk){ticker=tk.ticker;nombre=tk.nombre;continue;}}
      const com=parseComLine(line);
      if(com&&Math.abs(com.ars)>0)rows.push({comitente:com.comitente,tipo,moneda,ticker,nombre,ars:com.ars});
    }
  }
  const dd={};rows.forEach(r=>{const k=`${r.comitente}|${r.ticker}|${r.tipo}`;if(!dd[k]||Math.abs(r.ars)>Math.abs(dd[k].ars))dd[k]=r;});
  const result=Object.values(dd).filter(r=>r.ars>0);
  onLog(`✓ ${result.length} posiciones · ${[...new Set(result.map(r=>r.comitente))].length} comitentes`);
  return result;
}

// ── Chart components ──────────────────────────────────────────────────────────
function DonutChart({data,size=160}){
  const ref=useRef();const inst=useRef();
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"doughnut",
      data:{labels:data.map(d=>d.label),datasets:[{data:data.map(d=>d.value),backgroundColor:data.map(d=>d.color),borderWidth:1,borderColor:"rgba(0,0,0,0.2)"}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"68%",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+FMT2(ctx.raw)+" ("+PCT(ctx.raw/data.reduce((s,d)=>s+d.value,0))+")"}}}}
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data)]);
  return h("div",{className:"chart-wrap",style:{height:size}},h("canvas",{ref}));
}

function HBarChart({data,dataKey,labelKey,color,height,fmt}){
  const ref=useRef();const inst=useRef();
  const h_=height||Math.max(140,data.length*28+50);
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"bar",
      data:{labels:data.map(d=>d[labelKey]),datasets:[{data:data.map(d=>d[dataKey]),backgroundColor:color||"#2e80e8",borderRadius:4,borderSkipped:false}]},
      options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt?fmt(ctx.raw):" "+FMT2(ctx.raw)}}},
        scales:{x:{ticks:{callback:v=>FMT2(v),font:{size:9},color:"#506a8e"},grid:{color:"rgba(255,255,255,0.04)"}},y:{ticks:{font:{size:10},color:"#8ba3c7"},grid:{display:false}}}
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data),dataKey,color]);
  return h("div",{className:"chart-wrap",style:{height:h_}},h("canvas",{ref}));
}

function RadarChart({data,nameA,nameB}){
  const ref=useRef();const inst=useRef();
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"radar",
      data:{labels:data.map(d=>d.subject),datasets:[
        {label:nameA,data:data.map(d=>d.A),borderColor:"#2e80e8",backgroundColor:"rgba(46,128,232,0.15)",pointRadius:3,pointBackgroundColor:"#2e80e8"},
        {label:nameB,data:data.map(d=>d.B),borderColor:"#f5a623",backgroundColor:"rgba(245,166,35,0.12)",pointRadius:3,pointBackgroundColor:"#f5a623"}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:"bottom",labels:{color:"#8ba3c7",font:{size:10},boxWidth:10}}},
        scales:{r:{ticks:{color:"#506a8e",font:{size:8},backdropColor:"transparent"},grid:{color:"rgba(255,255,255,0.06)"},pointLabels:{color:"#8ba3c7",font:{size:9}}}}
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data),nameA,nameB]);
  return h("div",{className:"chart-wrap",style:{height:280}},h("canvas",{ref}));
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function Card({label,value,sub,color,accent}){
  return h("div",{className:"card"+(accent?" accent":"")},
    h("div",{className:"card-label"},label),
    h("div",{className:"card-val",style:color?{color}:{}},value),
    sub&&h("div",{className:"card-sub"},sub)
  );
}

function SectionBox({title,extra,children}){
  return h("div",{className:"section"},
    h("div",{className:"section-hdr"},
      h("span",{className:"section-title"},title),
      extra||null
    ),
    h("div",{className:"section-body"},children)
  );
}

function AlertBadge({level,text}){
  return h("div",{className:`al ${level}`},h("span",{style:{flexShrink:0}},level==="danger"?"▲":"●"),h("span",null,text));
}

function TypeBadge({tipo}){
  const cls=TIPO_BADGE[tipo]||"other";
  return h("span",{className:`td-badge ${cls}`},h("span",{className:"dot",style:{background:TC[tipo]||"#888",width:6,height:6}}),tipo);
}

// ── Vista Global ──────────────────────────────────────────────────────────────
function GlobalView({data,total,onSelectCom}){
  const [tab,setTab]=useState("overview");
  const [sCol,setSCol]=useState("ars");
  const [sDir,setSDir]=useState(-1);
  const [filter,setFilter]=useState("");

  const byTipo=useMemo(()=>{
    const m={};data.forEach(r=>{m[r.tipo]=(m[r.tipo]||0)+r.ars;});
    return Object.entries(m).map(([tipo,ars])=>({tipo,ars,pct:ars/total})).sort((a,b)=>b.ars-a.ars);
  },[data,total]);

  const byTicker=useMemo(()=>{
    const m={};data.forEach(r=>{if(!m[r.ticker])m[r.ticker]={ticker:r.ticker,nombre:r.nombre,tipo:r.tipo,ars:0,cs:new Set()};m[r.ticker].ars+=r.ars;m[r.ticker].cs.add(r.comitente);});
    return Object.values(m).map(x=>({...x,nC:x.cs.size})).sort((a,b)=>{
      if(sCol==="ars")return(b.ars-a.ars)*sDir;
      if(sCol==="ticker")return a.ticker.localeCompare(b.ticker)*sDir;
      if(sCol==="nC")return(b.nC-a.nC)*sDir;
      return 0;
    });
  },[data,sCol,sDir]);

  const byCom=useMemo(()=>{
    const m={};data.forEach(r=>{if(!m[r.comitente])m[r.comitente]={c:r.comitente,ars:0,nT:new Set()};m[r.comitente].ars+=r.ars;m[r.comitente].nT.add(r.ticker);});
    return Object.values(m).map(x=>({...x,nT:x.nT.size})).sort((a,b)=>b.ars-a.ars);
  },[data]);

  const alerts=useMemo(()=>{
    const res=[],cm={};
    data.filter(r=>r.ars>0).forEach(r=>{
      if(!cm[r.comitente])cm[r.comitente]={total:0,tickers:{},tipos:{},cash:0};
      cm[r.comitente].total+=r.ars;
      cm[r.comitente].tickers[r.ticker]=(cm[r.comitente].tickers[r.ticker]||0)+r.ars;
      cm[r.comitente].tipos[r.tipo]=(cm[r.comitente].tipos[r.tipo]||0)+r.ars;
      if(r.tipo==="Cash")cm[r.comitente].cash+=r.ars;
    });
    Object.entries(cm).forEach(([c,d])=>{
      if(d.total<500000)return;
      Object.entries(d.tickers).forEach(([tk,v])=>{const p=v/d.total;if(p>=.25)res.push({level:"danger",com:c,text:`Cte ${c}: ${(p*100).toFixed(0)}% concentrado en ${tk} (${FMT2(v)})`,total:d.total});});
      const cp=d.cash/d.total;if(cp>=.5&&d.total>5e6)res.push({level:"warn",com:c,text:`Cte ${c}: ${(cp*100).toFixed(0)}% en efectivo sin invertir (${FMT2(d.cash)})`,total:d.total});
      const nt=Object.keys(d.tickers).length;if(nt<=2&&d.total>5e6)res.push({level:"warn",com:c,text:`Cte ${c}: solo ${nt} instrumento${nt!==1?"s":""} — muy poca diversificación`,total:d.total});
    });
    return res.sort((a,b)=>(b.level==="danger"?1:0)-(a.level==="danger"?1:0)||(b.total-a.total));
  },[data]);

  const dCnt=alerts.filter(a=>a.level==="danger").length;
  const nComs=[...new Set(data.map(r=>r.comitente))].length;

  const donutData=byTipo.map(d=>({label:d.tipo,value:d.ars,color:TC[d.tipo]||"#888"}));

  const sh=(col,lbl)=>h("span",{onClick:()=>{if(sCol===col)setSDir(d=>-d);else{setSCol(col);setSDir(-1);}},style:{cursor:"pointer",color:sCol===col?"var(--accent)":"var(--text3)"}},lbl+(sCol===col?(sDir===-1?" ↓":" ↑"):""));

  const filtTick=filter?byTicker.filter(d=>d.ticker.toUpperCase().includes(filter.toUpperCase())||d.nombre.toUpperCase().includes(filter.toUpperCase())):byTicker;

  return h(Fragment,null,
    // cards
    h("div",{className:"card-row"},
      h(Card,{label:"Total cartera",value:FMT2(total),sub:`${nComs} comitentes activos`,accent:true}),
      h(Card,{label:"Clases de activos",value:byTipo.length,sub:"tipos distintos"}),
      h(Card,{label:"Instrumentos",value:[...new Set(data.map(r=>r.ticker))].length,sub:"tickers únicos"}),
      h(Card,{label:"Alertas",value:dCnt,sub:`+ ${alerts.filter(a=>a.level==="warn").length} advertencias`,color:dCnt>0?"var(--red)":"var(--green)"})
    ),

    // tabs
    h("div",{className:"section"},
      h("div",{className:"tabs"},
        ...["overview","activos","clientes","alertas"].map(t=>
          h("button",{key:t,className:"tab-btn"+(tab===t?" active":""),onClick:()=>setTab(t)},
            {overview:"Distribución",activos:"Activos",clientes:"Clientes",alertas:`Alertas${dCnt>0?" ("+dCnt+")":""}`}[t]
          )
        )
      ),
      h("div",{className:"section-body"},

        tab==="overview"&&h(Fragment,null,
          h("div",{className:"g2"},
            h("div",null,
              h("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:12}},"Distribución por clase de activo"),
              h(DonutChart,{data:donutData,size:200}),
              h("div",{className:"leg"},...byTipo.map(d=>
                h("span",{key:d.tipo,className:"legitem"},h("span",{className:"dot",style:{background:TC[d.tipo]||"#888"}}),`${d.tipo} ${PCT(d.pct)}`)
              ))
            ),
            h("div",null,
              h("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:12}},"Top 12 comitentes por valuación"),
              h(HBarChart,{data:byCom.slice(0,12),dataKey:"ars",labelKey:"c",color:"#2e80e8",height:300})
            )
          ),
          h("div",{style:{marginTop:16}},
            h("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:10}},"Por clase de activo"),
            h("div",{className:"tbl-wrap"},
              h("table",null,
                h("thead",null,h("tr",null,...["Clase","Valuación ARS","% cartera","Posiciones"].map(x=>h("th",{key:x},x)))),
                h("tbody",null,...byTipo.map(d=>h("tr",{key:d.tipo},
                  h("td",null,h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{className:"dot",style:{background:TC[d.tipo]||"#888"}}),d.tipo)),
                  h("td",{className:"td-num"},FMT(d.ars)),
                  h("td",null,
                    h("div",null,PCT(d.pct)),
                    h("div",{className:"bar-bg"},h("div",{className:"bar-fill",style:{width:PCT(d.pct),background:TC[d.tipo]||"#888"}}))
                  ),
                  h("td",{className:"td-num"},data.filter(r=>r.tipo===d.tipo).length)
                )))
              )
            )
          )
        ),

        tab==="activos"&&h(Fragment,null,
          h("div",{style:{marginBottom:10}},
            h("input",{value:filter,onChange:e=>setFilter(e.target.value),placeholder:"Buscar ticker o nombre…",style:{width:240}})
          ),
          h("div",{className:"tbl-wrap"},
            h("table",null,
              h("thead",null,h("tr",null,
                h("th",null,sh("ticker","Ticker")),
                h("th",null,"Nombre"),
                h("th",null,"Tipo"),
                h("th",null,"Moneda"),
                h("th",null,sh("ars","Valuación ARS")),
                h("th",null,sh("nC","Comitentes")),
                h("th",null,"% total")
              )),
              h("tbody",null,...filtTick.map((d,i)=>h("tr",{key:d.ticker+i},
                h("td",{style:{fontWeight:600,color:"var(--text)"}},d.ticker),
                h("td",{style:{color:"var(--text2)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis"}},d.nombre),
                h("td",null,h(TypeBadge,{tipo:d.tipo})),
                h("td",{style:{color:"var(--text3)"}},d.moneda),
                h("td",{className:"td-num"},FMT(d.ars)),
                h("td",{className:"td-num"},d.nC),
                h("td",null,
                  h("div",null,total>0?((d.ars/total)*100).toFixed(2)+"%":"—"),
                  h("div",{className:"bar-bg"},h("div",{className:"bar-fill",style:{width:total>0?((d.ars/total)*100)+"%":"0%",background:TC[d.tipo]||"#888"}}))
                )
              )))
            )
          )
        ),

        tab==="clientes"&&h(Fragment,null,
          h("div",{className:"tbl-wrap"},
            h("table",null,
              h("thead",null,h("tr",null,...["Comitente","Valuación ARS","% del libro","Instrumentos",""].map(x=>h("th",{key:x},x)))),
              h("tbody",null,...byCom.map((d,i)=>h("tr",{key:d.c},
                h("td",{style:{fontWeight:600,color:"var(--accent)"}},d.c),
                h("td",null,
                  h("div",{style:{fontWeight:500}},FMT(d.ars)),
                  h("div",{className:"bar-bg"},h("div",{className:"bar-fill",style:{width:`${Math.max(1,(d.ars/byCom[0].ars)*100)}%`,background:"#2e80e8"}}))
                ),
                h("td",{className:"td-num"},total>0?((d.ars/total)*100).toFixed(2)+"%":"—"),
                h("td",{className:"td-num"},d.nT),
                h("td",null,h("button",{onClick:()=>onSelectCom(d.c),style:{background:"var(--accent2)",color:"var(--text)",border:"none",borderRadius:"var(--r)",padding:"3px 10px",fontSize:10}},"Ver cartera"))
              )))
            )
          )
        ),

        tab==="alertas"&&h(Fragment,null,
          h("div",{className:"card-row",style:{marginBottom:16}},
            h(Card,{label:"Críticas",value:dCnt,sub:"Concentración > 25% en activo",color:dCnt>0?"var(--red)":"var(--green)"}),
            h(Card,{label:"Advertencias",value:alerts.filter(a=>a.level==="warn").length,sub:"Cash alto, poca diversif.",color:"var(--amber)"}),
            h(Card,{label:"Comitentes analizados",value:byCom.length,sub:"cartera > $500k"})
          ),
          h("div",{style:{marginBottom:8,fontSize:11,color:"var(--red)",fontWeight:600}},"▲ Concentración crítica"),
          ...(!dCnt?[h("div",{className:"empty"},"Sin alertas críticas ✓")]:alerts.filter(a=>a.level==="danger").map((a,i)=>h(AlertBadge,{key:i,...a}))),
          h("div",{style:{marginTop:14,marginBottom:8,fontSize:11,color:"var(--amber)",fontWeight:600}},"● Advertencias"),
          ...(alerts.filter(a=>a.level==="warn").length===0?[h("div",{className:"empty"},"Sin advertencias ✓")]:alerts.filter(a=>a.level==="warn").slice(0,50).map((a,i)=>h(AlertBadge,{key:i,...a})))
        )
      )
    )
  );
}

// ── Vista Cliente ─────────────────────────────────────────────────────────────
function ClientView({comitente,data,total,globalByTipo}){
  const [tab,setTab]=useState("posiciones");
  const [filter,setFilter]=useState("");

  const rows=useMemo(()=>data.filter(r=>r.comitente===comitente&&r.ars>0).sort((a,b)=>b.ars-a.ars),[comitente,data]);
  const totCom=useMemo(()=>SUM(rows),[rows]);

  const byTipo=useMemo(()=>{
    const m={};rows.forEach(r=>{m[r.tipo]=(m[r.tipo]||0)+r.ars;});
    return Object.entries(m).map(([tipo,ars])=>({tipo,ars,pct:ars/totCom})).sort((a,b)=>b.ars-a.ars);
  },[rows,totCom]);

  const donutData=byTipo.map(d=>({label:d.tipo,value:d.ars,color:TC[d.tipo]||"#888"}));

  // comparativa radar
  const TIPOS_RADAR=["Cash","Acciones ARG","CEDEAR","Bono Soberano","ON","FCI","Letra","Acc. Exterior"];
  const comByT={};rows.forEach(r=>{comByT[r.tipo]=(comByT[r.tipo]||0)+r.ars;});
  const globalByT={};
  if(globalByTipo)globalByTipo.forEach(d=>{globalByT[d.tipo]=d.pct*100;});
  const radarData=TIPOS_RADAR.map(t=>({
    subject:t.length>8?t.slice(0,7)+"…":t,
    A:Math.round(((comByT[t]||0)/totCom)*100||0),
    B:Math.round(globalByT[t]||0)
  }));

  const cash=(comByT["Cash"]||0)/totCom;
  const maxConc=Math.max(...Object.values(comByT).map(v=>v/totCom));
  const nInstr=rows.length;

  const filtRows=filter?rows.filter(r=>r.ticker.toUpperCase().includes(filter.toUpperCase())||r.nombre.toUpperCase().includes(filter.toUpperCase())):rows;

  return h(Fragment,null,
    // header cliente
    h("div",{className:"card-row"},
      h(Card,{label:"Total cartera",value:FMT2(totCom),sub:`${((totCom/total)*100).toFixed(2)}% del libro global`,accent:true}),
      h(Card,{label:"Instrumentos",value:nInstr,sub:"posiciones activas"}),
      h(Card,{label:"Cash",value:PCT({val:cash}["val"]||cash),sub:cash>=.4?"⚠ Elevado":cash>=.2?"Moderado":"Invertido",color:cash>=.4?"var(--amber)":cash<.1?"var(--green)":"var(--text)"}),
      h(Card,{label:"Mayor concentración",value:PCT(maxConc),sub:maxConc>=.25?"⚠ Revisar":"Diversificado",color:maxConc>=.25?"var(--red)":maxConc>=.15?"var(--amber)":"var(--green)"})
    ),

    h("div",{className:"section"},
      h("div",{className:"tabs"},
        ...["posiciones","distribucion","comparativa"].map(t=>
          h("button",{key:t,className:"tab-btn"+(tab===t?" active":""),onClick:()=>setTab(t)},
            {posiciones:"Posiciones",distribucion:"Distribución",comparativa:"vs Libro"}[t]
          )
        )
      ),
      h("div",{className:"section-body"},

        tab==="posiciones"&&h(Fragment,null,
          h("div",{style:{marginBottom:10,display:"flex",gap:10,alignItems:"center"}},
            h("input",{value:filter,onChange:e=>setFilter(e.target.value),placeholder:"Filtrar por ticker o nombre…",style:{width:220}}),
            h("span",{style:{fontSize:11,color:"var(--text3)"}},`${filtRows.length} posiciones · ${FMT2(SUM(filtRows))}`)
          ),
          h("div",{className:"tbl-wrap"},
            h("table",null,
              h("thead",null,h("tr",null,...["Ticker","Nombre","Tipo","Moneda","Valuación ARS","% cartera"].map(x=>h("th",{key:x},x)))),
              h("tbody",null,...filtRows.map((r,i)=>h("tr",{key:i},
                h("td",{style:{fontWeight:600,color:"var(--text)"}},r.ticker),
                h("td",{style:{color:"var(--text2)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}},r.nombre),
                h("td",null,h(TypeBadge,{tipo:r.tipo})),
                h("td",{style:{color:"var(--text3)"}},r.moneda),
                h("td",{className:"td-num",style:{fontWeight:500}},FMT(r.ars)),
                h("td",null,
                  h("div",null,((r.ars/totCom)*100).toFixed(1)+"%"),
                  h("div",{className:"bar-bg"},h("div",{className:"bar-fill",style:{width:((r.ars/totCom)*100)+"%",background:TC[r.tipo]||"#888"}}))
                )
              )))
            )
          )
        ),

        tab==="distribucion"&&h("div",{className:"g2"},
          h("div",null,
            h("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:12}},"Distribución de la cartera"),
            h(DonutChart,{data:donutData,size:220}),
            h("div",{className:"leg",style:{marginTop:10}},...byTipo.map(d=>
              h("span",{key:d.tipo,className:"legitem"},h("span",{className:"dot",style:{background:TC[d.tipo]||"#888"}}),`${d.tipo} ${PCT(d.pct)}`)
            ))
          ),
          h("div",null,
            h("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:12}},"Peso por clase"),
            h("div",{className:"tbl-wrap"},
              h("table",null,
                h("thead",null,h("tr",null,...["Clase","ARS","% cartera"].map(x=>h("th",{key:x},x)))),
                h("tbody",null,...byTipo.map(d=>h("tr",{key:d.tipo},
                  h("td",null,h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{className:"dot",style:{background:TC[d.tipo]||"#888"}}),d.tipo)),
                  h("td",{className:"td-num"},FMT(d.ars)),
                  h("td",null,
                    h("div",null,PCT(d.pct)),
                    h("div",{className:"bar-bg"},h("div",{className:"bar-fill",style:{width:PCT(d.pct),background:TC[d.tipo]||"#888"}}))
                  )
                )))
              )
            )
          )
        ),

        tab==="comparativa"&&h(Fragment,null,
          h("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:12}},"Perfil del comitente vs distribución promedio del libro global"),
          h("div",{className:"g2"},
            h("div",null,h(RadarChart,{data:radarData,nameA:`Cte ${comitente}`,nameB:"Libro global"})),
            h("div",null,
              h("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:10}},"Diferencia por clase (pp)"),
              h("div",{className:"tbl-wrap"},
                h("table",null,
                  h("thead",null,h("tr",null,...["Clase",`Cte ${comitente}`,"Global","Δ"].map(x=>h("th",{key:x},x)))),
                  h("tbody",null,...TIPOS_RADAR.map(t=>{
                    const a=((comByT[t]||0)/totCom*100);
                    const b=globalByT[t]||0;
                    const delta=a-b;
                    return h("tr",{key:t},
                      h("td",null,h("span",{style:{display:"flex",alignItems:"center",gap:5}},h("span",{className:"dot",style:{background:TC[t]||"#888"}}),t)),
                      h("td",{className:"td-num",style:{color:"var(--accent)"}},a.toFixed(1)+"%"),
                      h("td",{className:"td-num",style:{color:"var(--amber)"}},b.toFixed(1)+"%"),
                      h("td",{className:"td-num",style:{fontWeight:500,color:Math.abs(delta)>15?"var(--red)":Math.abs(delta)>8?"var(--amber)":"var(--text2)"}},
                        (delta>0?"+":"")+delta.toFixed(1)+"pp")
                    );
                  }))
                )
              )
            )
          )
        )
      )
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(false);
  const [prog,setProg]=useState(0);
  const [log,setLog]=useState("");
  const [drag,setDrag]=useState(false);
  const [selectedCom,setSelectedCom]=useState(null);
  const [sbFilter,setSbFilter]=useState("");
  const [date,setDate]=useState("");
  const fileRef=useRef();

  const total=useMemo(()=>SUM(data),[data]);
  const COMS=useMemo(()=>[...new Set(data.map(r=>r.comitente))].sort((a,b)=>+a-+b),[data]);
  const comTotals=useMemo(()=>{
    const m={};data.forEach(r=>{m[r.comitente]=(m[r.comitente]||0)+r.ars;});return m;
  },[data]);

  const globalByTipo=useMemo(()=>{
    const m={};data.forEach(r=>{m[r.tipo]=(m[r.tipo]||0)+r.ars;});
    return Object.entries(m).map(([tipo,ars])=>({tipo,ars,pct:ars/total}));
  },[data,total]);

  const handleFile=useCallback(async file=>{
    if(!file){return;}
    const name=file.name.toLowerCase();
    const isCSV=name.endsWith(".csv")||name.endsWith(".txt")||name.endsWith(".xls")||name.endsWith(".xlsx");
    if(!isCSV){alert("Subí el archivo CSV/XLS exportado desde CMA (el reporte de valuación).");return;}
    setLoading(true);setProg(0);setLog("Iniciando…");
    try{
      const rows=await parseCSV(file,setProg,msg=>{setLog(msg);});
      setData(rows);
      const m=file.name.match(/(\d{8})/);
      if(m){const d=m[1];setDate(`${d.slice(6)}.${d.slice(4,6)}.${d.slice(0,4)}`);}
      else{setDate(new Date().toLocaleDateString("es-AR"));}
    }catch(e){setLog("Error: "+e.message);console.error(e);}
    setLoading(false);
  },[]);

  const onDrop=e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);};

  const filtComs=sbFilter?COMS.filter(c=>c.includes(sbFilter)):COMS;

  if(!data.length){
    return h("div",{className:"upload-screen"},
      h("div",{style:{textAlign:"center",marginBottom:20}},
        h("div",{style:{fontSize:24,fontWeight:700,color:"var(--accent)",marginBottom:4}},"CMA Dashboard"),
        h("div",{style:{fontSize:12,color:"var(--text3)"}},"Capital Markets Argentina · Herramienta para asesores")
      ),
      h("div",{className:"upload-box"+(drag?" drag":""),onClick:()=>fileRef.current.click(),
        onDragOver:e=>{e.preventDefault();setDrag(true);},onDragLeave:()=>setDrag(false),onDrop},
        h("div",{className:"upload-icon"},"📊"),
        h("div",{className:"upload-title"},"Subí el reporte de valuación"),
        h("div",{className:"upload-sub"},"Arrastrá el PDF o hacé click · Reporte CMA · Cualquier fecha"),
        loading&&h(Fragment,null,
          h("div",{className:"pbg"},h("div",{className:"pfill",style:{width:prog+"%"}})),
          h("div",{className:"plog"},log)
        )
      ),
      h("input",{ref:fileRef,type:"file",accept:".pdf",style:{display:"none"},onChange:e=>handleFile(e.target.files[0])})
    );
  }

  return h(Fragment,null,
    // HEADER
    h("div",{className:"hdr"},
      h("div",{className:"hdr-logo"},"CMA"),
      h("div",{className:"hdr-sep"}),
      h("div",{className:"hdr-total"},"Cartera total",h("span",null,FMT2(total))),
      h("div",{className:"hdr-sep"}),
      h("div",{className:"hdr-total"},"Comitentes",h("span",null,COMS.length)),
      date&&h(Fragment,null,h("div",{className:"hdr-sep"}),h("div",{className:"hdr-total"},"Valuación",h("span",null,date))),
      h("div",{className:"hdr-right"},
        selectedCom&&h("div",{className:"tag"},`Comitente ${selectedCom}`),
        h("button",{className:"btn-load",onClick:()=>fileRef.current.click()},"+ Nuevo CSV/XLS"),
        h("input",{ref:fileRef,type:"file",accept:".csv,.xls,.xlsx,.txt",style:{display:"none"},onChange:e=>handleFile(e.target.files[0])})
      )
    ),

    // BODY
    h("div",{className:"layout"},
      // SIDEBAR
      h("div",{className:"sidebar"},
        h("div",{className:"sb-search"},
          h("input",{value:sbFilter,onChange:e=>setSbFilter(e.target.value),placeholder:"Buscar comitente…"})
        ),
        h("div",{className:"sb-list"},
          h("div",{className:"sb-item global"+(selectedCom===null?" active":""),onClick:()=>setSelectedCom(null)},
            "📊 Libro global",h("span",{className:"sb-badge"},COMS.length)
          ),
          ...filtComs.map(c=>h("div",{key:c,className:"sb-item"+(selectedCom===c?" active":""),onClick:()=>setSelectedCom(c)},
            h("span",null,c),
            h("span",{className:"sb-badge"},FMT2(comTotals[c]||0))
          ))
        )
      ),

      // MAIN CONTENT
      h("div",{className:"main"},
        selectedCom===null
          ?h(GlobalView,{data,total,globalByTipo,onSelectCom:setSelectedCom})
          :h(ClientView,{comitente:selectedCom,data,total,globalByTipo})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
