<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CMA Dashboard</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0d1b2e;color:white}
.layout{display:flex;height:100vh}
.sidebar{width:200px;background:#112240;padding:10px;overflow:auto}
.item{padding:6px;cursor:pointer;border-radius:4px}
.item:hover{background:#1e3a5f}
.item.active{background:#2e80e8}
.main{flex:1;padding:20px;overflow:auto}
.card{background:#112240;padding:15px;border-radius:8px;margin-bottom:10px}
button{cursor:pointer}
</style>
</head>

<body>
<div id="root"></div>

<script>
const {useState,useMemo,useEffect,useRef}=React;

/* ========= HELPERS ========= */

const FMT=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n);
const FMT2=n=>n>=1e9?"$"+(n/1e9).toFixed(2)+"B":n>=1e6?"$"+(n/1e6).toFixed(1)+"M":FMT(n);

const parseArgNum=s=>{
 if(!s||!s.trim()||s=="-")return null;
 const v=parseFloat(s.replace(/\./g,"").replace(",","."));
 return isNaN(v)?null:v;
};

/* ========= PARSER ARREGLADO ========= */

function parseCSV(text){
 const lines=text.split(/\r?\n/);
 const sep=lines[0].includes("\t")?"\t":";";

 let tipo="Cash",moneda="USD",ticker="USD",nombre="Dólar";
 const rows=[];

 for(let i=1;i<lines.length;i++){
   const line=lines[i];
   if(!line.trim()) continue;

   const cols=line.split(sep);
   const c0=(cols[0]||"").trim();

   if(!c0) continue;
   if(c0.toLowerCase().startsWith("total")) continue;

   const ars=parseArgNum(cols[11]);

   if(ars===null){
     const txt=c0.toLowerCase();

     if(txt.includes("cedear")) tipo="CEDEAR";
     else if(txt.includes("acciones")) tipo="Acciones";
     else if(txt.includes("obligaciones")) tipo="ON";
     else if(txt.includes("fondos")) tipo="FCI";
     else if(txt.includes("títulos")) tipo="Bonos";
     else if(txt.includes("letras")) tipo="Letra";
     else if(txt.includes("fideicomiso")) tipo="FF";
     else if(txt.includes("futuros")) tipo="Futuro";
     else if(txt.includes("dólar")||txt.includes("pesos")) tipo="Cash";

     if(txt.includes("pesos")) moneda="ARS";
     else if(txt.includes("cable")) moneda="USD Cable";
     else if(txt.includes("dólar")) moneda="USD";

     const m=c0.match(/^(.+?)\s*-\s*.+?\/\s*(.+)$/);
     if(m){
       ticker=m[1].trim();
       nombre=m[2].trim();
     }

     continue;
   }

   if(/^\d{3,7}$/.test(c0) && ars>0){
     rows.push({comitente:c0,tipo,moneda,ticker,nombre,ars});
   }
 }

 return rows;
}

/* ========= CHART FIX ========= */

function Donut({data}){
 const ref=useRef();
 const chartRef=useRef();

 useEffect(()=>{
   if(!ref.current) return;

   if(chartRef.current){
     chartRef.current.destroy();
   }

   if(!data.length) return;

   chartRef.current=new Chart(ref.current,{
     type:"doughnut",
     data:{
       labels:data.map(d=>d.label),
       datasets:[{
         data:data.map(d=>d.value),
       }]
     },
     options:{
       responsive:true,
       plugins:{legend:{display:true}}
     }
   });

 },[data]);

 return React.createElement("canvas",{ref});
}

/* ========= APP ========= */

function App(){
 const [data,setData]=useState([]);
 const [sel,setSel]=useState(null);
 const [error,setError]=useState("");

 const total=useMemo(()=>data.reduce((s,r)=>s+r.ars,0),[data]);

 const byTipo=useMemo(()=>{
   const m={};
   data.forEach(r=>m[r.tipo]=(m[r.tipo]||0)+r.ars);
   return Object.entries(m).map(([k,v])=>({label:k,value:v}));
 },[data]);

 const coms=useMemo(()=>[...new Set(data.map(r=>r.comitente))],[data]);

 const handleFile=async file=>{
   try{
     const text=await file.text();
     const rows=parseCSV(text);

     if(!rows.length){
       setError("El CSV no tiene datos válidos");
       return;
     }

     setError("");
     setData(rows);

   }catch(e){
     setError("Error leyendo archivo");
   }
 };

 if(!data.length){
   return React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh"}},
     React.createElement("h2",null,"CMA Dashboard"),
     error && React.createElement("div",{style:{color:"red"}},error),
     React.createElement("button",{onClick:()=>document.getElementById("file").click()},"Subir CSV"),
     React.createElement("input",{id:"file",type:"file",style:{display:"none"},onChange:e=>handleFile(e.target.files[0])})
   );
 }

 return React.createElement("div",{className:"layout"},

   React.createElement("div",{className:"sidebar"},
     React.createElement("div",{className:"item"+(sel===null?" active":""),onClick:()=>setSel(null)},"Global"),
     ...coms.map(c=>
       React.createElement("div",{key:c,className:"item"+(sel===c?" active":""),onClick:()=>setSel(c)},c)
     )
   ),

   React.createElement("div",{className:"main"},

     React.createElement("div",{className:"card"},
       React.createElement("h2",null,"Total: "+FMT2(total))
     ),

     !sel &&
     React.createElement("div",{style:{width:350}},
       React.createElement(Donut,{data:byTipo})
     ),

     sel &&
     React.createElement("div",{className:"card"},
       React.createElement("h3",null,"Cliente "+sel),
       ...data.filter(r=>r.comitente===sel).map((r,i)=>
         React.createElement("div",{key:i},
           r.ticker+" - "+FMT(r.ars)
         )
       )
     )
   )
 );
}

ReactDOM.createRoot(document.getElementById("root")).render(
 React.createElement(App)
);
</script>
</body>
</html>
