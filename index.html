<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CMA Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2e;--bg2:#112240;--bg3:#1a2f4a;--bg4:#1e3a5f;
  --text:#e8f0fe;--text2:#8ba3c7;--text3:#506a8e;
  --accent:#2e80e8;--accent2:#1a5cbf;
  --green:#00c896;--red:#f05c5c;--amber:#f5a623;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --r:8px;--rl:12px;
}
html,body,#root{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:13px}
#root{display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border2);flex-shrink:0}
.hdr-logo{font-size:15px;font-weight:700;color:var(--accent)}
.hdr-sep{width:1px;height:24px;background:var(--border2)}
.hdr-info{font-size:11px;color:var(--text2)}
.hdr-info span{color:var(--text);font-weight:600;margin-left:4px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn-primary{background:var(--accent2);color:var(--text);border:none;border-radius:var(--r);padding:6px 14px;font-size:11px;cursor:pointer}
.btn-primary:hover{background:var(--accent)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;background:var(--bg3);color:var(--text);border:.5px solid var(--border2);border-radius:var(--r);padding:5px 8px;font-size:11px;outline:none}
.sb-list{flex:1;overflow-y:auto}
.sb-list::-webkit-scrollbar{width:4px}
.sb-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.sb-item{padding:7px 14px;font-size:12px;cursor:pointer;border-left:3px solid transparent;color:var(--text2);display:flex;justify-content:space-between;align-items:center}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--bg4);color:var(--text);border-left-color:var(--accent);font-weight:500}
.sb-item.global{color:var(--accent);font-weight:600}
.sb-badge{font-size:9px;color:var(--text3);background:var(--bg4);padding:1px 5px;border-radius:4px;white-space:nowrap}
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.card-row{display:flex;gap:12px;flex-wrap:wrap}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;flex:1;min-width:0}
.card.hi{border-color:var(--accent);background:linear-gradient(135deg,var(--bg3),var(--bg4))}
.clabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.cval{font-size:20px;font-weight:700;line-height:1.1}
.csub{font-size:10px;color:var(--text3);margin-top:3px}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.sec-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.sec-body{padding:16px}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tbtn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px;font-size:11px;cursor:pointer;color:var(--text3);font-weight:500}
.tbtn:hover{color:var(--text2)}
.tbtn.on{color:var(--accent);border-bottom-color:var(--accent)}
.tbl{overflow-x:auto}
table{border-collapse:collapse;width:100%}
th{padding:8px 10px;text-align:left;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap}
th:hover{color:var(--text2)}
td{padding:7px 10px;font-size:11px;border-bottom:1px solid var(--border)}
tbody tr:hover{background:var(--bg3)}
.num{text-align:right;font-family:monospace;font-size:11px}
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px}
@media(max-width:900px){.g2{grid-template-columns:1fr}}
.al{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:var(--r);margin-bottom:6px;font-size:11px;line-height:1.5}
.al.danger{background:rgba(240,92,92,.12);color:#f09595;border:.5px solid rgba(240,92,92,.3)}
.al.warn{background:rgba(245,166,35,.10);color:#f5c842;border:.5px solid rgba(245,166,35,.25)}
.bar-bg{height:4px;border-radius:2px;background:var(--bg4);overflow:hidden;width:100%;margin-top:3px}
.bar-fill{height:100%;border-radius:2px}
.dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.leg{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:8px}
.legitem{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2)}
.cw{position:relative}
.empty{padding:24px;text-align:center;color:var(--text3);font-size:12px}
select,input{background:var(--bg3);color:var(--text);border:.5px solid var(--border2);border-radius:var(--r);padding:5px 9px;font-size:11px;outline:none}
/* UPLOAD */
.up-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:40px}
.up-box{border:2px dashed var(--border2);border-radius:var(--rl);padding:4rem 3rem;text-align:center;cursor:pointer;max-width:480px;width:100%;background:var(--bg2);transition:border-color .2s,background .2s}
.up-box:hover,.up-box.drag{border-color:var(--accent);background:var(--bg3)}
.up-icon{font-size:48px;margin-bottom:14px}
.up-title{font-size:18px;font-weight:600;margin-bottom:8px}
.up-sub{font-size:12px;color:var(--text2)}
.pbg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:16px}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.plog{font-size:10px;color:var(--text3);margin-top:8px;font-family:monospace;min-height:16px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:e,useState,useMemo,useRef,useCallback,useEffect,Fragment}=React;

// ── helpers ───────────────────────────────────────────────────────────────────
const FMT=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n);
const PCT=n=>(n*100).toFixed(1)+"%";
const FMT2=n=>n>=1e9?"$"+(n/1e9).toFixed(2)+"B":n>=1e6?"$"+(n/1e6).toFixed(1)+"M":n>=1e3?"$"+(n/1e3).toFixed(0)+"K":FMT(n);
const SUM=rows=>rows.reduce((s,r)=>s+r.ars,0);

const TC={"Cash":"#378ADD","Acciones ARG":"#1D9E75","CEDEAR":"#7F77DD","Acc. Exterior":"#D85A30","Bono Soberano":"#D4537E","ON":"#639922","Tít. Provincial":"#185FA5","FCI":"#BA7517","Letra":"#993556","Tít. Público":"#0F6E56","FF":"#3C3489","Futuro":"#888780"};

// ── CSV parser ────────────────────────────────────────────────────────────────
// Columnas del CSV de CMA (13 cols, separadas por TAB):
// 0:Comitente 1:Disp 2:NoDisp 3:TotalTenencia 4:PPP 5:CotEmision 6:ImpEmision
// 7:Fecha 8:CotLocal 9:Rendimiento 10:%Rend 11:ImporteARS 12:%
const SMAP={
  "U$S - Dólar":"Cash|USD","U$S-C - Dólar Cable":"Cash|USD Cable","$ - Pesos":"Cash|ARS",
  "Acciones / Pesos":"Acciones ARG|ARS","Acciones / Dólar":"Acc. Exterior|USD","Acciones / Dólar Cable":"Acc. Exterior|USD Cable",
  "Acciones Exterior / Dólar":"Acc. Exterior|USD","Acciones Exterior / Dólar Cable":"Acc. Exterior|USD Cable",
  "CEDEAR / Pesos":"CEDEAR|ARS","Fondos / Dólar":"FCI|USD","Fondos / Dólar Cable":"FCI|USD Cable","Fondos / Pesos":"FCI|ARS",
  "Títulos Públicos / Dólar":"Tít. Público|USD","Títulos Públicos / Dólar Cable":"Tít. Público|USD Cable","Títulos Públicos / Pesos":"Tít. Público|ARS",
  "Títulos Provinciales / Dólar":"Tít. Provincial|USD","Títulos Provinciales / Dólar Cable":"Tít. Provincial|USD Cable",
  "Obligaciones Negociables / Dólar":"ON|USD","Obligaciones Negociables / Dólar Cable":"ON|USD Cable",
  "Fideicomiso Financiero / Dólar":"FF|USD","Fideicomiso Financiero / Pesos":"FF|ARS",
  "Futuros Rofex":"Futuro|ARS","Indices":"Futuro|ARS","LETRAS / Dólar Cable":"Letra|USD Cable","LETRAS / Pesos":"Letra|ARS",
};

const parseArgNum=s=>{
  if(!s||!s.trim()||s.trim()==="-")return null;
  const v=parseFloat(s.trim().replace(/\./g,"").replace(",","."));
  return isNaN(v)?null:v;
};

function parseCSVText(text,onLog){
  const lines=text.split(/\r?\n/);
  onLog("Líneas: "+lines.length);

  // detectar separador
  const headerLine=lines[0]||"";
  const sep=headerLine.includes("\t")?"\t":headerLine.includes(";")?";":"\t";
  onLog("Separador detectado: "+(sep==="\t"?"TAB":sep));

  const rows=[];
  let tipo="Cash",moneda="USD",ticker="USD",nombre="Dólar";

  for(let i=1;i<lines.length;i++){
    const line=lines[i];
    if(!line||!line.trim())continue;

    const cols=line.split(sep);
    const c0=(cols[0]||"").trim();
    if(!c0)continue;

    // Fila de total → saltar
    if(c0.toLowerCase().startsWith("total"))continue;

    // Columna 11 = ImporteARS
    const arsRaw=cols[11];
    const arsVal=parseArgNum(arsRaw);

    if(arsVal===null){
      // Es fila de sección, subsección o ticker
      // Limpiar trailing spaces para match
      const c0clean=c0.replace(/\s+$/,"");
      const found=Object.keys(SMAP).find(k=>c0clean===k||c0clean===k.replace(/\s+$/,""));
      if(found){
        [tipo,moneda]=SMAP[found].split("|");
        if(tipo==="Cash"){
          ticker=moneda==="ARS"?"ARS":moneda==="USD Cable"?"USD Cable":"USD";
          nombre=moneda==="ARS"?"Pesos":moneda==="USD Cable"?"Dólar Cable":"Dólar";
        }
        continue;
      }
      // Ticker: formato "GGAL - 534 / NOMBRE" o "CMA DD D - ... / ..."
      const m=c0.match(/^([A-Z][A-Z0-9 \-\.]{1,29}?)\s*-\s*[\w]+\s*\/\s*(.+)$/);
      if(m){ticker=m[1].trim();nombre=m[2].trim();}
      continue;
    }

    // Fila de comitente: c0 debe ser 3-7 dígitos
    if(!/^\d{3,7}$/.test(c0))continue;
    if(arsVal>0){
      rows.push({comitente:c0,tipo,moneda,ticker,nombre,ars:arsVal});
    }
  }

  onLog("Posiciones parseadas: "+rows.length);
  return rows;
}

// ── Chart helpers ─────────────────────────────────────────────────────────────
function DonutChart({data,size=200}){
  const ref=useRef();const inst=useRef();
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"doughnut",
      data:{labels:data.map(d=>d.label),datasets:[{data:data.map(d=>d.value),backgroundColor:data.map(d=>d.color),borderWidth:1,borderColor:"rgba(0,0,0,.2)"}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"68%",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+FMT2(ctx.raw)}}}}
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data)]);
  return e("div",{className:"cw",style:{height:size}},e("canvas",{ref}));
}

function HBar({data,vKey,lKey,color="#2e80e8",height}){
  const ref=useRef();const inst=useRef();
  const h=height||Math.max(120,data.length*28+40);
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"bar",
      data:{labels:data.map(d=>d[lKey]),datasets:[{data:data.map(d=>d[vKey]),backgroundColor:color,borderRadius:3}]},
      options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+FMT2(ctx.raw)}}},
        scales:{x:{ticks:{callback:v=>FMT2(v),font:{size:9},color:"#506a8e"},grid:{color:"rgba(255,255,255,.04)"}},y:{ticks:{font:{size:10},color:"#8ba3c7"},grid:{display:false}}}
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data),vKey,color]);
  return e("div",{className:"cw",style:{height:h}},e("canvas",{ref}));
}

function RadarChart({data,nA,nB}){
  const ref=useRef();const inst=useRef();
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:"radar",
      data:{labels:data.map(d=>d.s),datasets:[
        {label:nA,data:data.map(d=>d.A),borderColor:"#2e80e8",backgroundColor:"rgba(46,128,232,.15)",pointRadius:3},
        {label:nB,data:data.map(d=>d.B),borderColor:"#f5a623",backgroundColor:"rgba(245,166,35,.12)",pointRadius:3}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:"bottom",labels:{color:"#8ba3c7",font:{size:10},boxWidth:10}}},
        scales:{r:{ticks:{color:"#506a8e",font:{size:8},backdropColor:"transparent"},grid:{color:"rgba(255,255,255,.06)"},pointLabels:{color:"#8ba3c7",font:{size:9}}}}
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data),nA,nB]);
  return e("div",{className:"cw",style:{height:280}},e("canvas",{ref}));
}

// ── UI components ─────────────────────────────────────────────────────────────
function Card({label,value,sub,col,hi}){
  return e("div",{className:"card"+(hi?" hi":"")},
    e("div",{className:"clabel"},label),
    e("div",{className:"cval",style:col?{color:col}:{}},value),
    sub&&e("div",{className:"csub"},sub)
  );
}

function Alert({level,text}){
  return e("div",{className:"al "+level},e("span",{style:{flexShrink:0}},level==="danger"?"▲":"●"),e("span",null,text));
}

// ── Global view ───────────────────────────────────────────────────────────────
function GlobalView({data,total,onGo}){
  const [tab,setTab]=useState("dist");
  const [filt,setFilt]=useState("");

  const byTipo=useMemo(()=>{
    const m={};data.forEach(r=>{m[r.tipo]=(m[r.tipo]||0)+r.ars;});
    return Object.entries(m).map(([t,a])=>({tipo:t,ars:a,pct:a/total})).sort((a,b)=>b.ars-a.ars);
  },[data,total]);

  const byTicker=useMemo(()=>{
    const m={};data.forEach(r=>{
      if(!m[r.ticker])m[r.ticker]={tk:r.ticker,nb:r.nombre,tipo:r.tipo,ars:0,cs:new Set()};
      m[r.ticker].ars+=r.ars;m[r.ticker].cs.add(r.comitente);
    });
    return Object.values(m).map(x=>({...x,nC:x.cs.size})).sort((a,b)=>b.ars-a.ars);
  },[data]);

  const byCom=useMemo(()=>{
    const m={};data.forEach(r=>{
      if(!m[r.comitente])m[r.comitente]={c:r.comitente,ars:0,nT:new Set()};
      m[r.comitente].ars+=r.ars;m[r.comitente].nT.add(r.ticker);
    });
    return Object.values(m).map(x=>({...x,nT:x.nT.size})).sort((a,b)=>b.ars-a.ars);
  },[data]);

  const alerts=useMemo(()=>{
    const res=[],cm={};
    data.forEach(r=>{
      if(!cm[r.comitente])cm[r.comitente]={tot:0,tk:{},cash:0};
      cm[r.comitente].tot+=r.ars;
      cm[r.comitente].tk[r.ticker]=(cm[r.comitente].tk[r.ticker]||0)+r.ars;
      if(r.tipo==="Cash")cm[r.comitente].cash+=r.ars;
    });
    Object.entries(cm).forEach(([c,d])=>{
      if(d.tot<500000)return;
      Object.entries(d.tk).forEach(([tk,v])=>{const p=v/d.tot;if(p>=.25)res.push({level:"danger",text:`Cte ${c}: ${(p*100).toFixed(0)}% en ${tk} (${FMT2(v)})`});});
      const cp=d.cash/d.tot;if(cp>=.5&&d.tot>5e6)res.push({level:"warn",text:`Cte ${c}: ${(cp*100).toFixed(0)}% en efectivo (${FMT2(d.cash)})`});
      const nt=Object.keys(d.tk).length;if(nt<=2&&d.tot>5e6)res.push({level:"warn",text:`Cte ${c}: solo ${nt} instrumento${nt!==1?"s":""}`});
    });
    return res;
  },[data]);

  const dCnt=alerts.filter(a=>a.level==="danger").length;
  const nComs=[...new Set(data.map(r=>r.comitente))].length;
  const donutD=byTipo.map(d=>({label:d.tipo,value:d.ars,color:TC[d.tipo]||"#888"}));
  const filtTk=filt?byTicker.filter(d=>d.tk.toUpperCase().includes(filt.toUpperCase())||d.nb.toUpperCase().includes(filt.toUpperCase())):byTicker;

  const TABS=[["dist","Distribución"],["activos","Activos"],["clientes","Clientes"],["alertas",`Alertas${dCnt>0?" ("+dCnt+")":""}`]];

  return e(Fragment,null,
    e("div",{className:"card-row"},
      e(Card,{label:"Total cartera",value:FMT2(total),sub:nComs+" comitentes",hi:true}),
      e(Card,{label:"Clases",value:byTipo.length,sub:"tipos distintos"}),
      e(Card,{label:"Instrumentos",value:[...new Set(data.map(r=>r.ticker))].length,sub:"tickers únicos"}),
      e(Card,{label:"Alertas",value:dCnt,sub:`+ ${alerts.filter(a=>a.level==="warn").length} advertencias`,col:dCnt>0?"var(--red)":"var(--green)"})
    ),
    e("div",{className:"section"},
      e("div",{className:"tabs"},...TABS.map(([k,lbl])=>e("button",{key:k,className:"tbtn"+(tab===k?" on":""),onClick:()=>setTab(k)},lbl))),
      e("div",{className:"sec-body"},

        tab==="dist"&&e(Fragment,null,
          e("div",{className:"g2"},
            e("div",null,
              e("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:10}},"Por clase de activo"),
              e(DonutChart,{data:donutD,size:200}),
              e("div",{className:"leg"},...byTipo.map(d=>e("span",{key:d.tipo,className:"legitem"},e("span",{className:"dot",style:{background:TC[d.tipo]||"#888"}}),d.tipo+" "+PCT(d.pct))))
            ),
            e("div",null,
              e("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:10}},"Top 12 comitentes"),
              e(HBar,{data:byCom.slice(0,12),vKey:"ars",lKey:"c",height:300})
            )
          ),
          e("div",{style:{marginTop:16}},
            e("div",{className:"tbl"},
              e("table",null,
                e("thead",null,e("tr",null,...["Clase","Valuación ARS","% cartera","Posiciones"].map(h=>e("th",{key:h},h)))),
                e("tbody",null,...byTipo.map(d=>{
                  const n=data.filter(r=>r.tipo===d.tipo).length;
                  return e("tr",{key:d.tipo},
                    e("td",null,e("span",{style:{display:"flex",alignItems:"center",gap:6}},e("span",{className:"dot",style:{background:TC[d.tipo]||"#888"}}),d.tipo)),
                    e("td",{className:"num"},FMT(d.ars)),
                    e("td",null,e("div",null,PCT(d.pct)),e("div",{className:"bar-bg"},e("div",{className:"bar-fill",style:{width:PCT(d.pct),background:TC[d.tipo]||"#888"}}))),
                    e("td",{className:"num"},n)
                  );
                }))
              )
            )
          )
        ),

        tab==="activos"&&e(Fragment,null,
          e("div",{style:{marginBottom:10}},
            e("input",{value:filt,onChange:ev=>setFilt(ev.target.value),placeholder:"Buscar ticker o nombre…",style:{width:240}})
          ),
          e("div",{className:"tbl"},
            e("table",null,
              e("thead",null,e("tr",null,...["Ticker","Nombre","Tipo","Moneda","Valuación ARS","Comitentes","% total"].map(h=>e("th",{key:h},h)))),
              e("tbody",null,...filtTk.map((d,i)=>e("tr",{key:d.tk+i},
                e("td",{style:{fontWeight:600}},d.tk),
                e("td",{style:{color:"var(--text2)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},d.nb),
                e("td",null,e("span",{style:{display:"inline-flex",alignItems:"center",gap:4,fontSize:10}},e("span",{className:"dot",style:{background:TC[d.tipo]||"#888",width:6,height:6}}),d.tipo)),
                e("td",{style:{color:"var(--text3)",fontSize:10}},d.moneda),
                e("td",{className:"num"},FMT(d.ars)),
                e("td",{className:"num"},d.nC),
                e("td",null,e("div",null,total>0?((d.ars/total)*100).toFixed(2)+"%":""),e("div",{className:"bar-bg"},e("div",{className:"bar-fill",style:{width:total>0?((d.ars/total)*100)+"%":"0",background:TC[d.tipo]||"#888"}})))
              )))
            )
          )
        ),

        tab==="clientes"&&e("div",{className:"tbl"},
          e("table",null,
            e("thead",null,e("tr",null,...["Comitente","Valuación ARS","% libro","Instr.",""].map(h=>e("th",{key:h},h)))),
            e("tbody",null,...byCom.map(d=>e("tr",{key:d.c},
              e("td",{style:{fontWeight:600,color:"var(--accent)"}},d.c),
              e("td",null,e("div",{style:{fontWeight:500}},FMT(d.ars)),e("div",{className:"bar-bg"},e("div",{className:"bar-fill",style:{width:`${Math.max(1,(d.ars/byCom[0].ars)*100)}%`,background:"#2e80e8"}}))),
              e("td",{className:"num"},total>0?((d.ars/total)*100).toFixed(2)+"%":""),
              e("td",{className:"num"},d.nT),
              e("td",null,e("button",{onClick:()=>onGo(d.c),style:{background:"var(--accent2)",color:"var(--text)",border:"none",borderRadius:"var(--r)",padding:"3px 10px",fontSize:10,cursor:"pointer"}},"Ver cartera"))
            )))
          )
        ),

        tab==="alertas"&&e(Fragment,null,
          e("div",{className:"card-row",style:{marginBottom:16}},
            e(Card,{label:"Críticas",value:dCnt,sub:"Concentración >25%",col:dCnt>0?"var(--red)":"var(--green)"}),
            e(Card,{label:"Advertencias",value:alerts.filter(a=>a.level==="warn").length,col:"var(--amber)"})
          ),
          e("div",{style:{marginBottom:8,fontWeight:600,fontSize:11,color:"var(--red)"}},"▲ Críticas"),
          ...(!dCnt?[e("div",{className:"empty"},"Sin alertas críticas ✓")]:alerts.filter(a=>a.level==="danger").map((a,i)=>e(Alert,{key:i,...a}))),
          e("div",{style:{marginTop:14,marginBottom:8,fontWeight:600,fontSize:11,color:"var(--amber)"}},"● Advertencias"),
          ...(alerts.filter(a=>a.level==="warn").length===0?[e("div",{className:"empty"},"Sin advertencias ✓")]:alerts.filter(a=>a.level==="warn").map((a,i)=>e(Alert,{key:i,...a})))
        )
      )
    )
  );
}

// ── Client view ───────────────────────────────────────────────────────────────
function ClientView({com,data,total,gByTipo}){
  const [tab,setTab]=useState("pos");
  const [filt,setFilt]=useState("");

  const rows=useMemo(()=>data.filter(r=>r.comitente===com&&r.ars>0).sort((a,b)=>b.ars-a.ars),[com,data]);
  const tot=useMemo(()=>SUM(rows),[rows]);

  const byTipo=useMemo(()=>{
    const m={};rows.forEach(r=>{m[r.tipo]=(m[r.tipo]||0)+r.ars;});
    return Object.entries(m).map(([t,a])=>({tipo:t,ars:a,pct:a/tot})).sort((a,b)=>b.ars-a.ars);
  },[rows,tot]);

  const cash=(byTipo.find(d=>d.tipo==="Cash")?.pct)||0;
  const maxConc=Math.max(0,...rows.map(r=>r.ars/tot));
  const donutD=byTipo.map(d=>({label:d.tipo,value:d.ars,color:TC[d.tipo]||"#888"}));

  const TIPOS_R=["Cash","Acciones ARG","CEDEAR","Bono Soberano","ON","FCI","Letra","Acc. Exterior"];
  const comByT={};rows.forEach(r=>{comByT[r.tipo]=(comByT[r.tipo]||0)+r.ars;});
  const gByT={};(gByTipo||[]).forEach(d=>{gByT[d.tipo]=d.pct*100;});
  const radD=TIPOS_R.map(t=>({s:t.length>8?t.slice(0,7)+"…":t,A:Math.round(((comByT[t]||0)/tot)*100||0),B:Math.round(gByT[t]||0)}));

  const filtRows=filt?rows.filter(r=>r.ticker.toUpperCase().includes(filt.toUpperCase())||r.nombre.toUpperCase().includes(filt.toUpperCase())):rows;

  const TABS=[["pos","Posiciones"],["dist","Distribución"],["cmp","vs Libro"]];

  return e(Fragment,null,
    e("div",{className:"card-row"},
      e(Card,{label:"Total cartera",value:FMT2(tot),sub:total>0?((tot/total)*100).toFixed(2)+"% del libro":"",hi:true}),
      e(Card,{label:"Posiciones",value:rows.length}),
      e(Card,{label:"Cash",value:PCT(cash),sub:cash>=.4?"⚠ Elevado":cash<.1?"Bien invertido":"Moderado",col:cash>=.4?"var(--amber)":cash<.1?"var(--green)":""}),
      e(Card,{label:"Mayor concentración",value:PCT(maxConc),col:maxConc>=.25?"var(--red)":maxConc>=.15?"var(--amber)":"var(--green)"})
    ),
    e("div",{className:"section"},
      e("div",{className:"tabs"},...TABS.map(([k,lbl])=>e("button",{key:k,className:"tbtn"+(tab===k?" on":""),onClick:()=>setTab(k)},lbl))),
      e("div",{className:"sec-body"},

        tab==="pos"&&e(Fragment,null,
          e("div",{style:{marginBottom:10,display:"flex",gap:10,alignItems:"center"}},
            e("input",{value:filt,onChange:ev=>setFilt(ev.target.value),placeholder:"Filtrar…",style:{width:200}}),
            e("span",{style:{fontSize:11,color:"var(--text3)"}},filtRows.length+" pos · "+FMT2(SUM(filtRows)))
          ),
          e("div",{className:"tbl"},
            e("table",null,
              e("thead",null,e("tr",null,...["Ticker","Nombre","Tipo","Moneda","Valuación ARS","% cartera"].map(h=>e("th",{key:h},h)))),
              e("tbody",null,...filtRows.map((r,i)=>e("tr",{key:i},
                e("td",{style:{fontWeight:600}},r.ticker),
                e("td",{style:{color:"var(--text2)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},r.nombre),
                e("td",null,e("span",{style:{display:"inline-flex",alignItems:"center",gap:4,fontSize:10}},e("span",{className:"dot",style:{background:TC[r.tipo]||"#888",width:6,height:6}}),r.tipo)),
                e("td",{style:{color:"var(--text3)",fontSize:10}},r.moneda),
                e("td",{className:"num",style:{fontWeight:500}},FMT(r.ars)),
                e("td",null,e("div",null,((r.ars/tot)*100).toFixed(1)+"%"),e("div",{className:"bar-bg"},e("div",{className:"bar-fill",style:{width:((r.ars/tot)*100)+"%",background:TC[r.tipo]||"#888"}})))
              )))
            )
          )
        ),

        tab==="dist"&&e("div",{className:"g2"},
          e("div",null,
            e("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:10}},"Distribución"),
            e(DonutChart,{data:donutD,size:220}),
            e("div",{className:"leg"},...byTipo.map(d=>e("span",{key:d.tipo,className:"legitem"},e("span",{className:"dot",style:{background:TC[d.tipo]||"#888"}}),d.tipo+" "+PCT(d.pct))))
          ),
          e("div",null,
            e("div",{className:"tbl"},
              e("table",null,
                e("thead",null,e("tr",null,...["Clase","ARS","% cartera"].map(h=>e("th",{key:h},h)))),
                e("tbody",null,...byTipo.map(d=>e("tr",{key:d.tipo},
                  e("td",null,e("span",{style:{display:"flex",alignItems:"center",gap:6}},e("span",{className:"dot",style:{background:TC[d.tipo]||"#888"}}),d.tipo)),
                  e("td",{className:"num"},FMT(d.ars)),
                  e("td",null,e("div",null,PCT(d.pct)),e("div",{className:"bar-bg"},e("div",{className:"bar-fill",style:{width:PCT(d.pct),background:TC[d.tipo]||"#888"}})))
                )))
              )
            )
          )
        ),

        tab==="cmp"&&e(Fragment,null,
          e("p",{style:{fontSize:11,color:"var(--text3)",marginBottom:12}},"Perfil del comitente vs libro global"),
          e("div",{className:"g2"},
            e("div",null,e(RadarChart,{data:radD,nA:"Cte "+com,nB:"Libro global"})),
            e("div",null,
              e("div",{className:"tbl"},
                e("table",null,
                  e("thead",null,e("tr",null,...["Clase","Cte "+com,"Global","Δ"].map(h=>e("th",{key:h},h)))),
                  e("tbody",null,...TIPOS_R.map(t=>{
                    const a=((comByT[t]||0)/tot*100),b=gByT[t]||0,d=a-b;
                    return e("tr",{key:t},
                      e("td",null,e("span",{style:{display:"flex",alignItems:"center",gap:5}},e("span",{className:"dot",style:{background:TC[t]||"#888"}}),t)),
                      e("td",{className:"num",style:{color:"var(--accent)"}},a.toFixed(1)+"%"),
                      e("td",{className:"num",style:{color:"var(--amber)"}},b.toFixed(1)+"%"),
                      e("td",{className:"num",style:{fontWeight:500,color:Math.abs(d)>15?"var(--red)":Math.abs(d)>8?"var(--amber)":"var(--text2)"}},
                        (d>0?"+":"")+d.toFixed(1)+"pp")
                    );
                  }))
                )
              )
            )
          )
        )
      )
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(false);
  const [prog,setProg]=useState(0);
  const [log,setLog]=useState("");
  const [drag,setDrag]=useState(false);
  const [sel,setSel]=useState(null);
  const [sbF,setSbF]=useState("");
  const [date,setDate]=useState("");
  const fileRef=useRef();

  const total=useMemo(()=>SUM(data),[data]);
  const COMS=useMemo(()=>[...new Set(data.map(r=>r.comitente))].sort((a,b)=>+a-+b),[data]);
  const comTots=useMemo(()=>{const m={};data.forEach(r=>{m[r.comitente]=(m[r.comitente]||0)+r.ars;});return m;},[data]);
  const gByTipo=useMemo(()=>{const m={};data.forEach(r=>{m[r.tipo]=(m[r.tipo]||0)+r.ars;});return Object.entries(m).map(([t,a])=>({tipo:t,ars:a,pct:a/total}));},[data,total]);

  const handleFile=useCallback(async file=>{
    if(!file)return;
    setLoading(true);setProg(0);setLog("Leyendo archivo…");
    try{
      const text=await file.text();
      if(!text||!text.trim()){setLog("ERROR: archivo vacío");setLoading(false);return;}
      setLog("Parseando…");
      const rows=parseCSVText(text,msg=>setLog(msg));
      if(!rows.length){setLog("ERROR: no se encontraron posiciones. Verificá que sea el CSV de CMA.");setLoading(false);return;}
      setData(rows);
      const m=file.name.match(/(\d{8})/);
      if(m){const d=m[1];setDate(`${d.slice(6)}.${d.slice(4,6)}.${d.slice(0,4)}`);}
      else setDate(new Date().toLocaleDateString("es-AR"));
    }catch(err){setLog("Error: "+err.message);console.error(err);}
    setLoading(false);
  },[]);

  const onDrop=useCallback(ev=>{ev.preventDefault();setDrag(false);handleFile(ev.dataTransfer.files[0]);},[handleFile]);

  if(!data.length){
    return e("div",{className:"up-screen"},
      e("div",{style:{textAlign:"center",marginBottom:20}},
        e("div",{style:{fontSize:26,fontWeight:700,color:"var(--accent)",marginBottom:4}},"CMA Dashboard"),
        e("div",{style:{fontSize:12,color:"var(--text3)"}},"Capital Markets Argentina · Herramienta para asesores")
      ),
      e("div",{
        className:"up-box"+(drag?" drag":""),
        onClick:()=>fileRef.current.click(),
        onDragOver:ev=>{ev.preventDefault();setDrag(true);},
        onDragLeave:()=>setDrag(false),
        onDrop
      },
        e("div",{className:"up-icon"},"📊"),
        e("div",{className:"up-title"},"Subí el reporte de valuación"),
        e("div",{className:"up-sub"},"Arrastrá el archivo CSV exportado desde CMA o hacé click"),
        loading&&e(Fragment,null,
          e("div",{className:"pbg"},e("div",{className:"pfill",style:{width:prog+"%"}})),
          e("div",{className:"plog"},log)
        ),
        !loading&&log&&e("div",{className:"plog",style:{color:"var(--red)"}},log)
      ),
      e("input",{ref:fileRef,type:"file",style:{display:"none"},onChange:ev=>handleFile(ev.target.files[0])})
    );
  }

  const filtComs=sbF?COMS.filter(c=>c.includes(sbF)):COMS;

  return e(Fragment,null,
    e("div",{className:"hdr"},
      e("div",{className:"hdr-logo"},"CMA"),
      e("div",{className:"hdr-sep"}),
      e("div",{className:"hdr-info"},"Cartera",e("span",null,FMT2(total))),
      e("div",{className:"hdr-sep"}),
      e("div",{className:"hdr-info"},"Comitentes",e("span",null,COMS.length)),
      date&&e(Fragment,null,e("div",{className:"hdr-sep"}),e("div",{className:"hdr-info"},"Valuación",e("span",null,date))),
      e("div",{className:"hdr-right"},
        sel&&e("span",{style:{fontSize:11,background:"rgba(46,128,232,.15)",color:"var(--accent)",borderRadius:4,padding:"3px 8px"}},"Cte "+sel),
        e("button",{className:"btn-primary",onClick:()=>fileRef.current.click()},"+ Nuevo CSV"),
        e("input",{ref:fileRef,type:"file",style:{display:"none"},onChange:ev=>handleFile(ev.target.files[0])})
      )
    ),
    e("div",{className:"layout"},
      e("div",{className:"sidebar"},
        e("div",{className:"sb-search"},e("input",{value:sbF,onChange:ev=>setSbF(ev.target.value),placeholder:"Buscar…"})),
        e("div",{className:"sb-list"},
          e("div",{className:"sb-item global"+(sel===null?" active":""),onClick:()=>setSel(null)},
            e("span",null,"📊 Libro global"),e("span",{className:"sb-badge"},COMS.length)
          ),
          ...filtComs.map(c=>e("div",{key:c,className:"sb-item"+(sel===c?" active":""),onClick:()=>setSel(c)},
            e("span",null,c),e("span",{className:"sb-badge"},FMT2(comTots[c]||0))
          ))
        )
      ),
      e("div",{className:"main"},
        sel===null
          ?e(GlobalView,{data,total,gByTipo,onGo:setSel})
          :e(ClientView,{com:sel,data,total,gByTipo})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
</script>
</body>
</html>
