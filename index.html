<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CMA Dashboard</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Chart -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d1b2e;
  color:white;
}

.container{
  padding:20px;
}

.upload{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  gap:20px;
}

.box{
  border:2px dashed #2e80e8;
  padding:40px;
  cursor:pointer;
  text-align:center;
}

.card{
  background:#112240;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const {useState,useMemo,useEffect,useRef} = React;

/* ================= HELPERS ================= */

const FMT = n =>
  new Intl.NumberFormat("es-AR",{
    style:"currency",
    currency:"ARS",
    maximumFractionDigits:0
  }).format(n);

const FMT2 = n =>
  n>=1e9?"$"+(n/1e9).toFixed(2)+"B":
  n>=1e6?"$"+(n/1e6).toFixed(1)+"M":
  n>=1e3?"$"+(n/1e3).toFixed(0)+"K":
  FMT(n);

const parseArgNum = s=>{
  if(!s || !s.trim() || s==="-" ) return null;
  const v=parseFloat(s.replace(/\./g,"").replace(",","."));
  return isNaN(v)?null:v;
};

/* ================= PARSER ================= */

function parseCSV(text){
  const lines=text.split(/\r?\n/);
  const sep = lines[0]?.includes("\t") ? "\t" : ";";

  let tipo="Cash";
  let moneda="USD";
  let ticker="USD";
  let nombre="Dólar";

  const rows=[];

  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(sep);
    const c0=(cols[0]||"").trim();
    if(!c0) continue;

    const ars=parseArgNum(cols[11]);

    if(ars===null){
      const m=c0.match(/^(.+?)\s*-\s*.+?\/\s*(.+)$/);
      if(m){
        ticker=m[1].trim();
        nombre=m[2].trim();
      }
      continue;
    }

    if(/^\d{3,7}$/.test(c0) && ars>0){
      rows.push({comitente:c0,tipo,moneda,ticker,nombre,ars});
    }
  }

  return rows;
}

/* ================= CHART ================= */

function Donut({data}){
  const ref=useRef();

  useEffect(()=>{
    if(!data.length) return;

    const chart=new Chart(ref.current,{
      type:"doughnut",
      data:{
        labels:data.map(d=>d.label),
        datasets:[{
          data:data.map(d=>d.value)
        }]
      }
    });

    return ()=>chart.destroy();
  },[data]);

  return React.createElement("canvas",{ref});
}

/* ================= APP ================= */

function App(){

  const [data,setData]=useState([]);

  const total=useMemo(
    ()=>data.reduce((s,r)=>s+r.ars,0),
    [data]
  );

  const byTipo=useMemo(()=>{
    const m={};
    data.forEach(r=>{
      m[r.tipo]=(m[r.tipo]||0)+r.ars;
    });
    return Object.entries(m).map(([k,v])=>({
      label:k,value:v
    }));
  },[data]);

  const handleFile=async file=>{
    const text=await file.text();
    const rows=parseCSV(text);
    setData(rows);
  };

  /* ================= UI ================= */

  if(!data.length){
    return React.createElement("div",{className:"upload"},
      React.createElement("h2",null,"CMA Dashboard"),
      React.createElement("div",{
        className:"box",
        onClick:()=>document.getElementById("file").click()
      },"Subir CSV"),
      React.createElement("input",{
        id:"file",
        type:"file",
        style:{display:"none"},
        onChange:e=>handleFile(e.target.files[0])
      })
    );
  }

  return React.createElement("div",{className:"container"},
    React.createElement("div",{className:"card"},
      React.createElement("h2",null,"Total: "+FMT2(total))
    ),

    React.createElement("div",{style:{width:300}},
      React.createElement(Donut,{data:byTipo})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(App)
);
</script>

</body>
</html>
